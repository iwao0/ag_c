<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ag_c Wasm API</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 0;
      }
      textarea, pre {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 16px;
        border: 0;
        resize: none;
        font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre;
        overflow: auto;
      }
      textarea {
        border-right: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        outline: none;
      }
      button {
        font: inherit;
        padding: 6px 12px;
      }
      select {
        font: inherit;
        padding: 6px 8px;
      }
      #status {
        min-width: 14em;
        text-align: right;
        color: color-mix(in srgb, CanvasText 65%, transparent);
      }
      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr 1fr;
        }
        textarea {
          border-right: 0;
          border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <button id="run" type="button">Compile</button>
      <select id="mode" aria-label="Output mode">
        <option value="wat">WAT</option>
        <option value="object">Object</option>
        <option value="linked">Linked Wasm</option>
      </select>
      <span id="status">Loading wasm...</span>
    </header>
    <main>
      <textarea id="source" spellcheck="false">int main(){return 42;}
</textarea>
      <pre id="output"></pre>
    </main>
    <script type="module">
      import { createToolchain } from "./agc-toolchain.js";

      const status = document.getElementById("status");
      const source = document.getElementById("source");
      const output = document.getElementById("output");
      const run = document.getElementById("run");
      const mode = document.getElementById("mode");
      const toolchain = await createToolchain({
        compilerWasm: "../../build/wasm_selfhost_api/ag_c_wasm_api.wasm",
        linkerWasm: "../../build/wasm_linker_selfhost/ag_wasm_link.wasm",
      });

      function hexDump(bytes) {
        const lines = [];
        for (let off = 0; off < bytes.length; off += 16) {
          const chunk = bytes.subarray(off, off + 16);
          const hex = Array.from(chunk, (b) => b.toString(16).padStart(2, "0")).join(" ");
          lines.push(`${off.toString(16).padStart(8, "0")}  ${hex}`);
        }
        return lines.join("\n");
      }

      function compile() {
        try {
          if (mode.value === "object") {
            const obj = toolchain.compileObject(source.value);
            output.textContent = hexDump(obj);
          } else if (mode.value === "linked") {
            const wasm = toolchain.compileLinkedWasm(source.value, { exports: ["main"] });
            output.textContent = hexDump(wasm);
          } else {
            output.textContent = toolchain.compileWat(source.value);
          }
          status.textContent = "OK";
        } catch (err) {
          output.textContent = err && err.stack ? err.stack : String(err);
          status.textContent = "Failed";
        }
      }

      run.addEventListener("click", compile);
      mode.addEventListener("change", compile);
      compile();
    </script>
  </body>
</html>
