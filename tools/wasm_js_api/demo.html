<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ag_c Wasm API</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 0;
      }
      textarea, pre {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 16px;
        border: 0;
        resize: none;
        font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre;
        overflow: auto;
      }
      textarea {
        border-right: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        outline: none;
      }
      button {
        font: inherit;
        padding: 6px 12px;
      }
      #status {
        min-width: 14em;
        text-align: right;
        color: color-mix(in srgb, CanvasText 65%, transparent);
      }
      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr 1fr;
        }
        textarea {
          border-right: 0;
          border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <button id="run" type="button">Compile</button>
      <span id="status">Loading wasm...</span>
    </header>
    <main>
      <textarea id="source" spellcheck="false">int main(){return 42;}
</textarea>
      <pre id="output"></pre>
    </main>
    <script type="module">
      import { createCompiler } from "./agc-wasm.js";

      const status = document.getElementById("status");
      const source = document.getElementById("source");
      const output = document.getElementById("output");
      const run = document.getElementById("run");
      const compiler = await createCompiler("../../build/wasm_selfhost_api/ag_c_wasm_api.wasm");

      function compile() {
        try {
          output.textContent = compiler.compileWat(source.value);
          status.textContent = "OK";
        } catch (err) {
          output.textContent = err && err.stack ? err.stack : String(err);
          status.textContent = "Failed";
        }
      }

      run.addEventListener("click", compile);
      compile();
    </script>
  </body>
</html>
