<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ag_c Wasm API</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 0;
      }
      .sources {
        display: grid;
        grid-template-rows: 1fr 1fr;
        min-height: 0;
      }
      textarea, pre {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 16px;
        border: 0;
        resize: none;
        font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre;
        overflow: auto;
      }
      textarea {
        border-right: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        outline: none;
      }
      textarea:last-child {
        border-bottom: 0;
      }
      button {
        font: inherit;
        padding: 6px 12px;
      }
      select {
        font: inherit;
        padding: 6px 8px;
      }
      #status {
        min-width: 14em;
        text-align: right;
        color: color-mix(in srgb, CanvasText 65%, transparent);
      }
      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr 1fr;
        }
        textarea {
          border-right: 0;
          border-bottom: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <button id="run" type="button">Compile</button>
      <button id="download" type="button" disabled>Download</button>
      <select id="mode" aria-label="Output mode">
        <option value="wat">WAT</option>
        <option value="object">Object</option>
        <option value="linked">Linked Wasm</option>
      </select>
      <span id="status">Loading wasm...</span>
    </header>
    <main>
      <div class="sources">
        <textarea class="source" spellcheck="false">int other(void);
int main(void){return other()+1;}
</textarea>
        <textarea class="source" spellcheck="false">int other(void){return 41;}
</textarea>
      </div>
      <pre id="output"></pre>
    </main>
    <script type="module">
      const status = document.getElementById("status");
      const sources = Array.from(document.querySelectorAll(".source"));
      const output = document.getElementById("output");
      const run = document.getElementById("run");
      const download = document.getElementById("download");
      const mode = document.getElementById("mode");
      let lastDownload = null;

      function runCompileInWorker(request) {
        return new Promise((resolve, reject) => {
          const worker = new Worker("./demo-worker.js", { type: "module" });
          const timeout = setTimeout(() => {
            worker.terminate();
            reject(new Error("compile timed out; the worker was stopped"));
          }, 5000);
          worker.onmessage = (ev) => {
            clearTimeout(timeout);
            worker.terminate();
            if (ev.data && ev.data.ok) {
              resolve(ev.data);
            } else {
              reject(new Error(ev.data && ev.data.error ? ev.data.error : "compile failed"));
            }
          };
          worker.onerror = (err) => {
            clearTimeout(timeout);
            worker.terminate();
            reject(new Error(err.message || "worker error"));
          };
          worker.postMessage(request);
        });
      }

      function formatError(err) {
        return `Compile error\n\n${err && err.message ? err.message : String(err)}`;
      }

      async function compile() {
        try {
          const sourceTexts = sources.map((el) => el.value).filter((text) => text.trim().length > 0);
          if (sourceTexts.length === 0) {
            throw new Error("no source input");
          }
          lastDownload = null;
          download.disabled = true;
          run.disabled = true;
          status.textContent = "Compiling...";
          const result = await runCompileInWorker({ mode: mode.value, sources: sourceTexts });
          output.textContent = result.output;
          lastDownload = result.download;
          download.disabled = false;
          status.textContent = result.status;
        } catch (err) {
          output.textContent = formatError(err);
          status.textContent = "Failed";
        } finally {
          run.disabled = false;
        }
      }

      run.addEventListener("click", compile);
      mode.addEventListener("change", compile);
      download.addEventListener("click", () => {
        if (!lastDownload) return;
        const blob = lastDownload.bytes
          ? new Blob([lastDownload.bytes], { type: lastDownload.type })
          : new Blob([lastDownload.text], { type: lastDownload.type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = lastDownload.name;
        a.click();
        URL.revokeObjectURL(url);
      });
      compile();
    </script>
  </body>
</html>
