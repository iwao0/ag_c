name: CI

on:
  push:
  pull_request:

jobs:
  test-and-bench:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build And Test
        run: make test

      - name: Check Function Size
        run: bash scripts/check_function_size.sh

      - name: Run Bench
        run: make bench | tee bench.out

      - name: Check Tokenizer Perf Guard
        run: bash scripts/check_tokenizer_perf.sh bench.out
