name: CI

on:
  push:
  pull_request:

jobs:
  parser-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Parser Test
        run: make build/test_parser

      - name: Run Parser Test
        run: build/test_parser

  e2e-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build E2E Test
        run: make build/test_e2e

      - name: Run E2E Test
        run: build/test_e2e

  bench-and-guards:
    runs-on: macos-latest
    needs: [parser-test, e2e-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Core Tests
        run: make test

      - name: Check Function Size
        run: bash scripts/check_function_size.sh

      - name: Run Bench
        run: make bench | tee bench.out

      - name: Check Tokenizer Perf Guard
        run: bash scripts/check_tokenizer_perf.sh bench.out

      - name: Check Parser Perf Guard
        run: bash scripts/check_parser_perf.sh bench.out
